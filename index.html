<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método Comparativo Direto de Dados de Mercado COM DEBUG INTEGRADO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #555;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,123,255,0.1);
        }
        h1 {
            color: #007BFF;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8em;
        }
        .logo {
            background: linear-gradient(135deg, #4b0082, #007BFF);
            color: white;
            font-weight: bold;
            font-size: 2em;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        .input-section label {
            display: block;
            font-weight: bold;
            color: #4b0082;
            margin-bottom: 10px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        #textoBruto {
            flex: 1;
            height: 300px;
            padding: 15px;
            border: 2px solid #007BFF;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            font-family: monospace;
        }
        #microfoneBtn {
            background: #007BFF;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50%;
            font-size: 1.5em;
            cursor: pointer;
            width: 60px;
            height: 60px;
            transition: background 0.3s;
        }
        #microfoneBtn:hover {
            background: #0056b3;
        }
        #microfoneBtn.active {
            background: #dc3545;
        }
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        .debug-box {
            background: #fff3cd;
            border: 2px solid #ffeaa7;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .debug-box h3 {
            color: #856404;
            margin-bottom: 15px;
        }
        .debug-box p {
            margin-bottom: 10px;
        }
        .response-box {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .response-box.error {
            background: #f8d7da;
            border-color: #f5c6cb;
        }
        .response-box h3 {
            color: #155724;
            margin-bottom: 15px;
        }
        .response-box.error h3 {
            color: #721c24;
        }
        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            font-size: 14px;
        }
        #message {
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 20px;
            display: none;
        }
        #message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        #message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        .close {
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #aaa;
        }
        .close:hover {
            color: #000;
        }
        @media (max-width: 600px) {
            .container {
                padding: 15px;
            }
            .input-group {
                flex-direction: column;
            }
            #microfoneBtn {
                width: 100%;
                border-radius: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Método Comparativo Direto de Dados de Mercado<br><small>COM DEBUG INTEGRADO</small></h1>
        <div class="logo">EXATA</div>
        
        <div class="input-section">
            <label for="textoBruto">Texto Bruto (Cole ou grave o texto aqui):</label>
            <div class="input-group">
                <textarea id="textoBruto" placeholder="Digite ou grave o texto bruto do mercado..."></textarea>
                <button id="microfoneBtn" title="Ativar microfone (pt-BR)">🎤</button>
            </div>
        </div>
        
        <div class="buttons">
            <button id="testarPayload">🔍 Testar Payload</button>
            <button id="enviar">🚀 Enviar para Processamento</button>
        </div>
        
        <div id="debugBox" class="debug-box">
            <h3>📊 Debug em Tempo Real:</h3>
            <p><strong>Texto Bruto (primeiros 100 chars):</strong> <span id="debugTexto">-</span></p>
            <p><strong>Tamanho:</strong> <span id="debugTamanho">0</span> caracteres</p>
            <p><strong>Status:</strong> <span id="debugStatus">Aguardando entrada...</span></p>
        </div>
        
        <div id="responseBox" class="response-box" style="display: none;">
            <h3>📥 Resposta do Webhook:</h3>
            <p><strong>Status HTTP:</strong> <span id="respStatus">-</span></p>
            <p><strong>Tempo de Resposta:</strong> <span id="respTempo">-</span> ms</p>
            <pre id="respBody">-</pre>
        </div>
        
        <div id="message"></div>
    </div>
    
    <!-- Modal para Testar Payload -->
    <div id="payloadModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h3>🔍 Payload JSON a ser enviado:</h3>
            <pre id="modalPre"></pre>
        </div>
    </div>
    
    <script>
        // Configurações
        const WEBHOOK_URL = 'https://bleatingfrilledlizard-n8n.cloudfy.live/webhook-test/mcddm';
        const textarea = document.getElementById('textoBruto');
        const debugTexto = document.getElementById('debugTexto');
        const debugTamanho = document.getElementById('debugTamanho');
        const debugStatus = document.getElementById('debugStatus');
        const testarBtn = document.getElementById('testarPayload');
        const enviarBtn = document.getElementById('enviar');
        const microfoneBtn = document.getElementById('microfoneBtn');
        const responseBox = document.getElementById('responseBox');
        const respStatus = document.getElementById('respStatus');
        const respTempo = document.getElementById('respTempo');
        const respBody = document.getElementById('respBody');
        const messageDiv = document.getElementById('message');
        const modal = document.getElementById('payloadModal');
        const closeModal = document.getElementById('closeModal');
        const modalPre = document.getElementById('modalPre');

        let recognition = null;
        let isRecording = false;

        // Função para mostrar mensagens
        function showMessage(msg, type = 'success') {
            console.log(`[${type.toUpperCase()}] ${msg}`);
            messageDiv.textContent = msg;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // Auto-save em localStorage
        function saveToStorage() {
            try {
                localStorage.setItem('texto_bruto_mcdm', textarea.value);
                console.log('Texto salvo no localStorage. Tamanho:', textarea.value.length);
            } catch (e) {
                console.error('Erro ao salvar no localStorage:', e);
            }
        }

        // Carregar do localStorage
        function loadFromStorage() {
            try {
                const saved = localStorage.getItem('texto_bruto_mcdm');
                if (saved) {
                    textarea.value = saved;
                    updateDebug();
                    console.log('Texto carregado do localStorage.');
                }
            } catch (e) {
                console.error('Erro ao carregar do localStorage:', e);
            }
        }

        // Atualizar debug em tempo real
        function updateDebug() {
            const texto = textarea.value;
            debugTexto.textContent = texto.substring(0, 100) + (texto.length > 100 ? '...' : '');
            debugTamanho.textContent = texto.length;
            debugStatus.textContent = texto.trim() ? '✅ Pronto para envio' : '❌ Vazio - Digite algo';
            console.log('Debug atualizado - Tamanho:', texto.length, 'Status:', debugStatus.textContent);
        }

        // Inicializar reconhecimento de voz
        function initRecognition() {
            try {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    throw new Error('SpeechRecognition não suportado neste navegador');
                }
                recognition = new SpeechRecognition();
                recognition.lang = 'pt-BR';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;
                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript;
                    textarea.value += transcript + ' ';
                    updateDebug();
                    saveToStorage();
                    console.log('Texto transcrito:', transcript);
                };
                recognition.onerror = function(event) {
                    console.error('Erro no reconhecimento de voz:', event.error);
                    microfoneBtn.classList.remove('active');
                    isRecording = false;
                    microfoneBtn.title = 'Erro: ' + event.error;
                };
                recognition.onend = function() {
                    microfoneBtn.classList.remove('active');
                    isRecording = false;
                };
                console.log('Reconhecimento de voz inicializado (pt-BR)');
            } catch (e) {
                console.error('Falha ao inicializar reconhecimento:', e);
                microfoneBtn.disabled = true;
                microfoneBtn.title = 'Microfone não suportado';
            }
        }

        // Testar Payload
        testarBtn.addEventListener('click', () => {
            try {
                const texto = textarea.value.trim();
                if (!texto) {
                    showMessage('Erro: Textarea vazio! Digite algo primeiro.', 'error');
                    return;
                }
                const payload = {
                    metodo: 'comparativo',
                    texto_bruto: texto
                };
                const jsonStr = JSON.stringify(payload, null, 2);
                console.log('=== TESTE PAYLOAD ===');
                console.log('Payload objeto:', payload);
                console.log('JSON string (tamanho:', jsonStr.length, '):', jsonStr);
                console.log('Texto bruto tamanho:', texto.length);
                modalPre.textContent = jsonStr;
                modal.style.display = 'block';
            } catch (e) {
                console.error('Erro ao testar payload:', e);
                showMessage('Erro ao gerar payload: ' + e.message, 'error');
            }
        });

        // Enviar para Webhook
        enviarBtn.addEventListener('click', async () => {
            try {
                const texto = textarea.value.trim();
                if (!texto) {
                    showMessage('Erro: Textarea vazio! Digite ou grave algo primeiro.', 'error');
                    return;
                }
                if (texto.length > 50000) { // Limite arbitrário para teste
                    if (!confirm('Texto muito grande (' + texto.length + ' chars). Continuar?')) return;
                }
                if (!confirm('Enviar? Payload tamanho: ' + texto.length + ' chars')) return;

                const payload = {
                    metodo: 'comparativo',
                    texto_bruto: texto
                };
                console.log('=== ENVIO INICIADO ===');
                console.log('Payload objeto:', payload);
                const jsonStr = JSON.stringify(payload);
                console.log('JSON string (tamanho:', jsonStr.length, '):', jsonStr.substring(0, 500) + (jsonStr.length > 500 ? '...' : ''));
                console.log('URL:', WEBHOOK_URL);

                const startTime = Date.now();
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: jsonStr
                });

                const tempo = Date.now() - startTime;
                console.log('Resposta recebida - Status:', response.status, 'Tempo:', tempo + 'ms');
                console.log('Headers:', [...response.headers.entries()]);

                let bodyText;
                try {
                    const bodyJson = await response.json();
                    bodyText = JSON.stringify(bodyJson, null, 2);
                } catch (e) {
                    bodyText = await response.text();
                    console.log('Resposta não é JSON válida:', bodyText);
                }

                // Mostrar resposta
                respStatus.textContent = response.status + ' ' + response.statusText;
                respTempo.textContent = tempo;
                respBody.textContent = bodyText;
                responseBox.className = response.ok ? 'response-box' : 'response-box error';
                responseBox.style.display = 'block';

                console.log('Resposta completa:', bodyText);
                showMessage(`Enviado! Status: ${response.status} em ${tempo}ms`, 'success');

            } catch (error) {
                console.error('=== ERRO NO ENVIO ===', error);
                respStatus.textContent = 'Erro de Rede';
                respTempo.textContent = 'N/A';
                respBody.textContent = error.message;
                responseBox.className = 'response-box error';
                responseBox.style.display = 'block';
                showMessage('Erro no envio: ' + error.message + '. Verifique console.', 'error');
            }
        });

        // Microfone toggle
        microfoneBtn.addEventListener('click', () => {
            if (!recognition) initRecognition();
            if (!recognition) return;

            if (isRecording) {
                recognition.stop();
            } else {
                recognition.start();
                microfoneBtn.classList.add('active');
                microfoneBtn.title = 'Parando...';
            }
        });

        // Modal close
        closeModal.addEventListener('click', () => {
            modal.style.display = 'none';
        });
        window.addEventListener('click', (e) => {
            if (e.target === modal) modal.style.display = 'none';
        });

        // Eventos da textarea
        textarea.addEventListener('input', () => {
            updateDebug();
            saveToStorage();
        });
        textarea.addEventListener('keyup', updateDebug); // Para debug em tempo real

        // Inicialização
        loadFromStorage();
        updateDebug();
        console.log('Página carregada. Abra o console (F12) para debug completo.');
    </script>
</body>
</html>
