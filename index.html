<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método Comparativo Direto de Dados de Mercado</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body {
            background: #f4f4f9;
            color: #555;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .logo {
            width: 200px;
            display: block;
            margin: 0 auto 20px;
        }
        h1 {
            color: #007BFF;
            text-align: center;
            margin-bottom: 30px;
        }
        h2 {
            color: #007BFF;
            border-bottom: 2px solid #007BFF;
            padding-bottom: 10px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        #rawText {
            flex: 1;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #ccc;
            border-radius: 8px;
            resize: vertical;
            font-size: 14px;
            box-sizing: border-box;
        }
        .mic-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .mic-btn:hover {
            background: #0056b3;
        }
        #status {
            display: block;
            color: #007BFF;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        input {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .fields-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .fields-grid input {
            margin: 0;
        }
        button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        label {
            display: block;
            margin: 10px 0;
            cursor: pointer;
        }
        #pontuacao {
            font-size: 18px;
            font-weight: bold;
            color: #007BFF;
            margin: 20px 0;
        }
        section {
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://raw.githubusercontent.com/fabiogrisard/addcasa/refs/heads/main/logoexatanovo.JPG" alt="Logo Exata" class="logo">
        <h1>Método Comparativo Direto de Dados de Mercado</h1>

        <!-- SEÇÃO 1: Visível ao carregar -->
        <div id="section1">
            <div class="input-group">
                <textarea id="rawText" placeholder="Cole aqui o texto bruto da matrícula, dados do imóvel..."></textarea>
                <button id="micBtn" class="mic-btn" title="Gravar áudio">🎤</button>
            </div>
            <div id="status">Parado</div>
            <div class="buttons">
                <button id="copyPrompt">Copiar Prompt para Gemini</button>
                <button id="processBtn">Enviar para Processamento</button>
            </div>
        </div>

        <!-- SEÇÃO 2: Oculta até processamento -->
        <div id="section2" style="display: none;">
            <h2>Dados do Imóvel (Obrigatórios)</h2>
            <div class="fields-grid">
                <input id="data_vistoria" type="date" placeholder="Data da Vistoria">
                <input id="proprietario" type="text" placeholder="Proprietário">
                <input id="endereco" type="text" placeholder="Endereço">
                <input id="area_total" type="number" step="0.01" placeholder="Área Total (m²)">
                <input id="area_util" type="number" step="0.01" placeholder="Área Útil (m²)">
                <input id="quartos" type="number" placeholder="Quartos">
                <input id="banheiros" type="number" placeholder="Banheiros">
                <input id="garagem" type="number" placeholder="Vagas de Garagem">
            </div>
            <div class="buttons">
                <button id="nextBtn">Próximo</button>
            </div>
        </div>

        <!-- SEÇÃO 3: Oculta até validação seção 2 -->
        <div id="section3" style="display: none;">
            <h2>Grau de Conservação</h2>
            <label><input type="radio" name="grau" value="I"> Grau I (Excelente)</label>
            <label><input type="radio" name="grau" value="II"> Grau II (Bom)</label>
            <label><input type="radio" name="grau" value="III"> Grau III (Regular)</label>
            <div id="pontuacao"></div>
            <div class="buttons">
                <button id="generatePDF">Gerar Laudo em PDF</button>
            </div>
        </div>
    </div>

    <script>
        // Inicialização do localStorage e elementos
        let recognition;

        // Função para inicializar Speech Recognition
        function initRecognition() {
            // Verifica suporte do navegador
            if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
                document.getElementById('status').textContent = 'Speech Recognition não suportado';
                document.getElementById('micBtn').style.display = 'none';
                return;
            }
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'pt-BR';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            // Evento de resultado da transcrição
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('rawText').value += transcript + ' ';
                document.getElementById('rawText').focus();
            };

            // Erro no reconhecimento
            recognition.onerror = function(event) {
                console.error('Erro no reconhecimento:', event.error);
                updateMicStatus('Erro de reconhecimento');
            };

            // Fim do reconhecimento
            recognition.onend = function() {
                updateMicStatus('Parado');
                document.getElementById('micBtn').style.background = '#007BFF';
            };
        }

        // Inicia o reconhecimento de voz
        function startRecognition(targetElementId) {
            if (recognition) {
                recognition.start();
                updateMicStatus('Gravando...');
                document.getElementById('micBtn').style.background = 'red';
            }
        }

        // Atualiza status do microfone
        function updateMicStatus(status) {
            document.getElementById('status').textContent = status;
        }

        // Salva dados no localStorage
        function saveData() {
            const data = {
                rawText: document.getElementById('rawText').value,
                data_vistoria: document.getElementById('data_vistoria').value,
                proprietario: document.getElementById('proprietario').value,
                endereco: document.getElementById('endereco').value,
                area_total: document.getElementById('area_total').value,
                area_util: document.getElementById('area_util').value,
                quartos: document.getElementById('quartos').value,
                banheiros: document.getElementById('banheiros').value,
                garagem: document.getElementById('garagem').value
            };
            localStorage.setItem('mcddm_data', JSON.stringify(data));
        }

        // Carrega dados do localStorage
        function loadData() {
            const saved = localStorage.getItem('mcddm_data');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('rawText').value = data.rawText || '';
                ['data_vistoria', 'proprietario', 'endereco', 'area_total', 'area_util', 'quartos', 'banheiros', 'garagem'].forEach(id => {
                    const el = document.getElementById(id);
                    if (data[id]) el.value = data[id];
                });
            }
        }

        // Obtém todos os dados
        function getAllData() {
            return {
                data_vistoria: document.getElementById('data_vistoria').value,
                proprietario: document.getElementById('proprietario').value,
                endereco: document.getElementById('endereco').value,
                area_total: document.getElementById('area_total').value,
                area_util: document.getElementById('area_util').value,
                quartos: document.getElementById('quartos').value,
                banheiros: document.getElementById('banheiros').value,
                garagem: document.getElementById('garagem').value
            };
        }

        // Calcula pontuação baseada no grau
        function getPontuacao(grau) {
            switch(grau) {
                case 'I': return '100%';
                case 'II': return '85%';
                case 'III': return '70%';
                default: return '0%';
            }
        }

        // Gera PDF com jsPDF
        function generatePDF(data, grau, pontuacao) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            // Adiciona logo
            doc.addImage('https://raw.githubusercontent.com/fabiogrisard/addcasa/refs/heads/main/logoexatanovo.JPG', 'JPG', 10, 10, 60, 25);
            doc.setFontSize(20);
            doc.text('Laudo - Método Comparativo Direto de Dados de Mercado', 80, 20);
            doc.setFontSize(12);
            doc.text(`Data da Vistoria: ${data.data_vistoria}`, 10, 50);
            doc.text(`Proprietário: ${data.proprietario}`, 10, 60);
            doc.text(`Endereço: ${data.endereco}`, 10, 70);
            doc.text(`Área Total: ${data.area_total} m²`, 10, 80);
            doc.text(`Área Útil: ${data.area_util} m²`, 10, 90);
            doc.text(`Quartos: ${data.quartos}`, 10, 100);
            doc.text(`Banheiros: ${data.banheiros}`, 10, 110);
            doc.text(`Garagem: ${data.garagem} vagas`, 10, 120);
            doc.text(`Grau de Conservação: ${grau}`, 10, 140);
            doc.text(`Pontuação: ${pontuacao}`, 10, 150);
            doc.save('laudo_mcddm.pdf');
        }

        // Envia dados para webhook
        async function sendWebhook(data, grau, pontuacao) {
            const fullData = { ...data, grau, pontuacao };
            try {
                await fetch('https://bleatingfrilledlizard-n8n.cloudfy.live/webhook-test/mcddm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fullData)
                });
                alert('Dados enviados ao webhook com sucesso!');
            } catch (error) {
                console.error('Erro no webhook:', error);
                alert('Erro ao enviar para webhook.');
            }
        }

        // Event listeners após carregamento da página
        window.onload = function() {
            initRecognition();
            loadData();

            // Botão copiar prompt para Gemini
            document.getElementById('copyPrompt').onclick = function() {
                const text = document.getElementById('rawText').value;
                const prompt = `Analise este texto da matrícula e extraia os seguintes dados em formato JSON: data_vistoria, proprietario, endereco, area_total, area_util, quartos, banheiros, garagem. Texto: ${text}`;
                navigator.clipboard.writeText(prompt).then(() => {
                    alert('Prompt copiado para Gemini!');
                });
            };

            // Botão enviar para processamento
            document.getElementById('processBtn').onclick = function() {
                saveData();
                document.getElementById('section1').style.display = 'none';
                document.getElementById('section2').style.display = 'block';
            };

            // Botão próximo (validação seção 2)
            document.getElementById('nextBtn').onclick = function() {
                const fields = ['data_vistoria', 'proprietario', 'endereco', 'area_total', 'area_util', 'quartos', 'banheiros', 'garagem'];
                let valid = true;
                fields.forEach(id => {
                    const el = document.getElementById(id);
                    if (!el.value.trim()) {
                        valid = false;
                        el.style.borderColor = 'red';
                    } else {
                        el.style.borderColor = '';
                    }
                });
                if (valid) {
                    saveData();
                    document.getElementById('section2').style.display = 'none';
                    document.getElementById('section3').style.display = 'block';
                } else {
                    alert('Preencha todos os 8 campos obrigatórios!');
                }
            };

            // Botão microfone
            document.getElementById('micBtn').onclick = function() {
                startRecognition('rawText');
            };

            // Radios do grau com cálculo automático de pontuação
            document.querySelectorAll('input[name="grau"]').forEach(radio => {
                radio.onchange = function() {
                    const pont = getPontuacao(this.value);
                    document.getElementById('pontuacao').innerHTML = `<strong>Pontuação automática: ${pont}</strong>`;
                };
            });

            // Botão gerar PDF
            document.getElementById('generatePDF').onclick = function() {
                const grauRadio = document.querySelector('input[name="grau"]:checked');
                if (!grauRadio) {
                    alert('Selecione um Grau de Conservação!');
                    return;
                }
                const data = getAllData();
                const grau = grauRadio.value;
                const pontuacao = getPontuacao(grau);
                generatePDF(data, grau, pontuacao);
                sendWebhook(data, grau, pontuacao);
            };
        };
    </script>
</body>
</html>
