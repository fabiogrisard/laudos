<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Laudos Imobiliários - EXATA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Estilos gerais e paleta de cores */
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #555;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .logo {
            width: 200px;
            display: block;
            margin: 0 auto 30px;
        }
        h2 {
            color: #007BFF;
            text-align: center;
        }
        button {
            background: #007BFF;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            resize: vertical;
            font-family: monospace;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        .radio-group { margin: 20px 0; }
        .radio-group label { display: block; margin: 10px 0; font-size: 18px; }
        #recordStatus {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }
        .status-parado { background: #d4edda; color: #155724; }
        .status-gravando { background: #f8d7da; color: #721c24; }
        .status-erro { background: #f8d7da; color: #721c24; }
        .missing { color: red; font-weight: bold; }
        #nav { text-align: center; margin-top: 30px; }
        #pontuacao { font-size: 24px; color: #007BFF; text-align: center; margin: 20px 0; }
        /* Responsivo */
        @media (max-width: 768px) {
            .container { padding: 20px; }
            textarea { height: 150px; }
            button { width: 100%; margin: 5px 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo EXATA -->
        <img src="https://raw.githubusercontent.com/fabiogrisard/addcasa/refs/heads/main/logoexatanovo.JPG" alt="Logo EXATA" class="logo">
        
        <!-- Estrutura de páginas -->
        <div id="pages">
            <!-- Página 1: Seleção de Método e Entrada de Dados -->
            <div id="page1">
                <h2>Página 1: Seleção de Método e Entrada de Dados</h2>
                <div class="radio-group">
                    <label><input type="radio" name="metodo" value="evolutivo" checked> Método Evolutivo</label>
                    <label><input type="radio" name="metodo" value="comparativo"> Método Comparativo Direto de Dados de Mercado</label>
                </div>
                <textarea id="textoBruto" placeholder="Cole aqui o texto bruto da matrícula, dados do imóvel, etc..."></textarea>
                
                <!-- Seção de captura de áudio -->
                <div id="audioSection">
                    <button id="startRecord">Iniciar Gravação</button>
                    <button id="stopRecord" disabled>Parar Gravação</button>
                    <div id="recordStatus" class="status-parado">Status: Parado</div>
                </div>
                
                <button id="copyPrompt">Copiar Prompt para Gemini</button>
                <button id="sendProcess">Enviar para Processamento</button>
            </div>
            
            <!-- Página 2: Validação e Preenchimento Manual -->
            <div id="page2" style="display: none;">
                <h2>Página 2: Validação e Preenchimento Manual</h2>
                <div id="missingFields"></div>
                <form id="dataForm">
                    <input id="data_vistoria" placeholder="Data da Vistoria (DD/MM/AAAA)">
                    <input id="proprietario" placeholder="Proprietário">
                    <input id="endereco" placeholder="Endereço Completo">
                    <input id="area_total" placeholder="Área Total (m²)">
                    <input id="area_util" placeholder="Área Útil (m²)">
                    <input id="quartos" placeholder="Número de Quartos">
                    <input id="banheiros" placeholder="Número de Banheiros">
                    <input id="garagem" placeholder="Vagas de Garagem">
                </form>
                <button id="next2">Próximo</button>
            </div>
            
            <!-- Página 3: Seleção de Grau de Fundamentação -->
            <div id="page3" style="display: none;">
                <h2>Página 3: Seleção de Grau de Fundamentação</h2>
                <div class="radio-group">
                    <label><input type="radio" name="grau" value="I"> Grau I</label>
                    <label><input type="radio" name="grau" value="II"> Grau II</label>
                    <label><input type="radio" name="grau" value="III" checked> Grau III</label>
                </div>
                <div id="pontuacao">Pontuação calculada: 0/100</div>
                <button id="gerarPDF">Gerar Laudo em PDF</button>
            </div>
        </div>
        
        <!-- Navegação -->
        <div id="nav">
            <button id="prev" style="display: none;">Anterior</button>
            <button id="next" style="display: none;">Próximo</button>
        </div>
    </div>
    
    <script>
        // Configurações e constantes
        const WEBHOOK_URL = 'https://bleatingfrilledlizard-n8n.cloudfy.live/webhook/laudo';
        const requiredFields = ['data_vistoria', 'proprietario', 'endereco', 'area_total', 'area_util', 'quartos', 'banheiros', 'garagem'];
        
        // Prompts dinâmicos para Gemini
        const promptTemplates = {
            evolutivo: `Você é especialista em laudos imobiliários pelo MÉTODO EVOLUTIVO. Analise o texto abaixo e extraia os dados em JSON estruturado:\n{\n  "data_vistoria": "DD/MM/AAAA",\n  "proprietario": "nome completo",\n  "endereco": "endereço completo",\n  "area_total": "valor m²",\n  "area_util": "valor m²",\n  "quartos": número,\n  "banheiros": número,\n  "garagem": vagas,\n  "caracteristicas": "descrição"\n}\n\nTexto a analisar:\n`,
            comparativo: `Você é especialista em laudos imobiliários pelo MÉTODO COMPARATIVO DIRETO DE DADOS DE MERCADO. Analise o texto abaixo e extraia os dados em JSON estruturado, incluindo comparáveis:\n{\n  "data_vistoria": "DD/MM/AAAA",\n  "proprietario": "nome completo",\n  "endereco": "endereço completo",\n  "area_total": "valor m²",\n  "area_util": "valor m²",\n  "quartos": número,\n  "banheiros": número,\n  "garagem": vagas,\n  "comparaveis": [{"endereco": "", "area": "", "valor": "", "data": ""}]\n}\n\nTexto a analisar:\n`
        };
        
        // Variáveis globais
        let currentPage = 1;
        let mediaRecorder = null;
        let audioChunks = [];
        let audioStream = null;
        let audioBase64 = '';
        let dadosCapturados = {};
        let metodo = 'evolutivo';
        
        // Inicialização e carregamento do localStorage
        function init() {
            // Carrega dados do localStorage
            const savedTexto = localStorage.getItem('textoBruto');
            const savedMetodo = localStorage.getItem('metodo');
            const savedDados = localStorage.getItem('dados_capturados');
            const savedAudio = localStorage.getItem('audio_base64');
            
            if (savedTexto) document.getElementById('textoBruto').value = savedTexto;
            if (savedMetodo) {
                metodo = savedMetodo;
                document.querySelector(`input[name=\"metodo\"][value=\"${savedMetodo}\"]`).checked = true;
            }
            if (savedAudio) audioBase64 = savedAudio;
            if (savedDados) {
                dadosCapturados = JSON.parse(savedDados);
                populateForm();
                updateMissingFields();
                calcPontuacao();
                showPage(2);
            }
            setupEventListeners();
            updateNav();
        }
        
        // Gerencia navegação entre páginas
        function showPage(pageNum) {
            document.querySelectorAll('#pages > div').forEach((p, i) => {
                p.style.display = i + 1 === pageNum ? 'block' : 'none';
            });
            currentPage = pageNum;
            if (pageNum === 2) {
                populateForm();
                updateMissingFields();
            } else if (pageNum === 3) {
                calcPontuacao();
            }
            updateNav();
            saveToStorage();
        }
        
        function updateNav() {
            const prevBtn = document.getElementById('prev');
            const nextBtn = document.getElementById('next');
            prevBtn.style.display = currentPage > 1 ? 'inline-block' : 'none';
            nextBtn.style.display = currentPage < 3 ? 'inline-block' : 'none';
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === 3;
        }
        
        // Salva dados no localStorage
        function saveToStorage() {
            localStorage.setItem('textoBruto', document.getElementById('textoBruto').value);
            localStorage.setItem('metodo', metodo);
            localStorage.setItem('dados_capturados', JSON.stringify(dadosCapturados));
            localStorage.setItem('audio_base64', audioBase64);
        }
        
        // Configura listeners de eventos
        function setupEventListeners() {
            // Método selecionado
            document.querySelectorAll('input[name="metodo"]').forEach(r => {
                r.addEventListener('change', (e) => {
                    metodo = e.target.value;
                    saveToStorage();
                });
            });
            
            // Gravação de áudio com Web Audio API / MediaRecorder
            document.getElementById('startRecord').addEventListener('click', startRecording);
            document.getElementById('stopRecord').addEventListener('click', stopRecording);
            
            // Copiar prompt para Gemini
            document.getElementById('copyPrompt').addEventListener('click', copyPromptToClipboard);
            
            // Enviar para processamento (webhook N8N)
            document.getElementById('sendProcess').addEventListener('click', sendToWebhook);
            
            // Validação e próximo página 2
            document.getElementById('next2').addEventListener('click', () => {
                if (validateFields()) {
                    saveDadosFromForm();
                    showPage(3);
                } else {
                    alert('Preencha todos os campos obrigatórios!');
                }
            });
            
            // Gerar PDF
            document.getElementById('gerarPDF').addEventListener('click', generatePDF);
            
            // Navegação
            document.getElementById('prev').addEventListener('click', () => {
                if (currentPage > 1) showPage(currentPage - 1);
            });
            document.getElementById('next').addEventListener('click', () => {
                if (currentPage === 1) {
                    // Em página 1, próximo só após envio ou manual
                } else if (currentPage === 2 && validateFields()) {
                    saveDadosFromForm();
                    showPage(3);
                }
            });
        }
        
        // Iniciar gravação de áudio
        async function startRecording() {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(audioStream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    audioBase64 = await blobToBase64(audioBlob);
                    document.getElementById('recordStatus').textContent = 'Status: Parado';
                    document.getElementById('recordStatus').className = 'status-parado';
                    saveToStorage();
                };
                
                mediaRecorder.start();
                document.getElementById('startRecord').disabled = true;
                document.getElementById('stopRecord').disabled = false;
                document.getElementById('recordStatus').textContent = 'Status: Gravando...';
                document.getElementById('recordStatus').className = 'status-gravando';
            } catch (err) {
                document.getElementById('recordStatus').textContent = 'Status: Erro no microfone';
                document.getElementById('recordStatus').className = 'status-erro';
                console.error('Erro na gravação:', err);
            }
        }
        
        // Parar gravação
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                mediaRecorder = null;
                if (audioStream) {
                    audioStream.getTracks().forEach(track => track.stop());
                    audioStream = null;
                }
                document.getElementById('startRecord').disabled = false;
                document.getElementById('stopRecord').disabled = true;
            }
        }
        
        // Converte blob para base64
        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }
        
        // Copia prompt dinâmico para clipboard
        async function copyPromptToClipboard() {
            const texto = document.getElementById('textoBruto').value;
            const prompt = promptTemplates[metodo] + texto;
            try {
                await navigator.clipboard.writeText(prompt);
                alert('Prompt copiado para a área de transferência! Cole no Gemini.');
            } catch (err) {
                console.error('Erro ao copiar:', err);
            }
        }
        
        // Envia dados para webhook N8N
        async function sendToWebhook() {
            const textoBruto = document.getElementById('textoBruto').value;
            if (!textoBruto.trim()) {
                alert('Insira o texto bruto!');
                return;
            }
            
            document.getElementById('sendProcess').textContent = 'Processando...';
            document.getElementById('sendProcess').disabled = true;
            
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        metodo,
                        texto_bruto: textoBruto,
                        audio_base64: audioBase64
                    })
                });
                const data = await response.json();
                if (data.dados_capturados) {
                    dadosCapturados = data.dados_capturados;
                    saveToStorage();
                    showPage(2);
                } else {
                    alert('Resposta inesperada do servidor.');
                }
            } catch (err) {
                alert('Erro no envio: ' + err.message);
            } finally {
                document.getElementById('sendProcess').textContent = 'Enviar para Processamento';
                document.getElementById('sendProcess').disabled = false;
            }
        }
        
        // Preenche formulário com dados capturados
        function populateForm() {
            requiredFields.forEach(field => {
                const input = document.getElementById(field);
                if (input) input.value = dadosCapturados[field] || '';
            });
        }
        
        // Salva dados do form em dadosCapturados
        function saveDadosFromForm() {
            requiredFields.forEach(field => {
                const input = document.getElementById(field);
                if (input) dadosCapturados[field] = input.value;
            });
            saveToStorage();
        }
        
        // Valida campos obrigatórios
        function validateFields() {
            return requiredFields.every(field => {
                const input = document.getElementById(field);
                return input && input.value.trim();
            });
        }
        
        // Atualiza campos faltantes
        function updateMissingFields() {
            const missingDiv = document.getElementById('missingFields');
            missingDiv.innerHTML = '';
            const missing = requiredFields.filter(field => !dadosCapturados[field]?.trim());
            if (missing.length > 0) {
                missing.forEach(field => {
                    const p = document.createElement('p');
                    p.className = 'missing';
                    p.textContent = `Campo obrigatório faltando: ${field.replace('_', ' ').toUpperCase()}`;
                    missingDiv.appendChild(p);
                });
            } else {
                const p = document.createElement('p');
                p.textContent = 'Todos os campos preenchidos! ✅';
                p.style.color = 'green';
                missingDiv.appendChild(p);
            }
        }
        
        // Calcula pontuação automática
        function calcPontuacao() {
            const filled = requiredFields.filter(field => dadosCapturados[field]?.trim()).length;
            const pontuacao = Math.round((filled / requiredFields.length) * 100);
            document.getElementById('pontuacao').textContent = `Pontuação calculada: ${pontuacao}/100`;
        }
        
        // Gera laudo em PDF com jsPDF e envia para webhook
        async function generatePDF() {
            const grau = document.querySelector('input[name="grau"]:checked')?.value || 'III';
            saveDadosFromForm();
            
            // Gera PDF client-side
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(20);
            doc.text('Laudo Imobiliário - EXATA', 20, 20);
            doc.setFontSize(12);
            doc.text(`Método: ${metodo.toUpperCase()}`, 20, 40);
            doc.text(`Grau de Fundamentação: ${grau}`, 20, 50);
            doc.text(`Pontuação: ${document.getElementById('pontuacao').textContent}`, 20, 60);
            doc.text('Dados do Imóvel:', 20, 80);
            let y = 90;
            for (let [key, value] of Object.entries(dadosCapturados)) {
                if (value) {
                    doc.text(`${key.replace('_', ' ').toUpperCase()}: ${value}`, 20, y);
                    y += 10;
                    if (y > 270) {
                        doc.addPage();
                        y = 20;
                    }
                }
            }
            doc.save(`laudo-imobiliario-${new Date().toISOString().slice(0,10)}.pdf`);
            
            // Envia dados completos para webhook para processamento server-side
            try {
                await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        metodo,
                        texto_bruto: localStorage.getItem('textoBruto'),
                        audio_base64: audioBase64,
                        dados_capturados: dadosCapturados,
                        grau_fundamentacao: grau
                    })
                });
                alert('PDF gerado e dados enviados para processamento!');
            } catch (err) {
                alert('PDF gerado, mas erro no envio: ' + err.message);
            }
        }
        
        // Inicializa a aplicação
        init();
    </script>
</body>
</html>
